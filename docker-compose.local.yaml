name: goquicksend
services:
  app:
    build:
      context: .
      dockerfile: docker/app/local/Dockerfile
    container_name: goquicksend_app
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    env_file:
      .env
    networks:
      default:

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: goquicksend_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    restart: unless-stopped
    networks:
      default:

  kafka:
    image: apache/kafka:4.1.0
    container_name: goquicksend_kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_LOG_SEGMENT_BYTES: 104857600
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      default:

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: goquicksend_kafka_ui
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: production
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      default:

  db:
    build:
      context: .
      dockerfile: ./docker/db/Dockerfile
    container_name: goquicksend_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: "${DB_NAME}"
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASS}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      default:

  redis:
    image: redis:8.4.0
    container_name: goquicksend_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      default:

  buggregator:
    container_name: goquicksend_buggregator
    image: butschster/buggregator:2
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "1025:1025"
      - "9912:9912"
      - "9913:9913"
    networks:
      default:

networks:
  default:
    name: goquicksend_network
    external: true

volumes:
  redis_data:
  postgres_data:
  kafka_data:
