name: goquicksend
services:

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: goquicksend_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    restart: unless-stopped
    networks:
      default:
        ipv4_address: 179.70.0.3

  kafka:
    image: bitnami/kafka:3.9
    container_name: goquicksend_kafka
    environment:
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_NODE_ID: "1"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_NUM_PARTITIONS: "6"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_CFG_LOG_RETENTION_HOURS: "24"
      KAFKA_CFG_MESSAGE_MAX_BYTES: "28214400"
      KAFKA_CFG_REPLICA_FETCH_MAX_BYTES: "26214400"
      KAFKA_CFG_LOG_SEGMENT_BYTES: "536870912"
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      default:
        ipv4_address: 179.70.0.4

  db:
    build:
      context: .
      dockerfile: ./docker/db/Dockerfile
    container_name: goquicksend_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: "${DB_NAME}"
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASS}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      default:
        ipv4_address: 179.70.0.5

  redis:
    image: redis:8.4.0
    container_name: goquicksend_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      default:
        ipv4_address: 179.70.0.6

  buggregator:
    container_name: goquicksend_buggregator
    image: butschster/buggregator:2
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "1025:1025"
      - "9912:9912"
      - "9913:9913"
    networks:
      default:
        ipv4_address: 172.75.0.5

networks:
  default:
    name: ${DOCKER_NETWORK}
    external: true

volumes:
  redis_data:
  postgres_data:
  kafka_data:
